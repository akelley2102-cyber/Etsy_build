<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Niche Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --ink: #1A1410;
    --rust: #C4451A;
    --gold: #D4A847;
    --sage: #7A9E7E;
    --paper: #EDE8DC;
    --shadow: #2D2520;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.5;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding: 24px 40px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    background: var(--paper);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--rust); font-style: italic; }

  .tagline {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.5;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 40px;
  }

  .search-section {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
    border: 2px solid var(--ink);
    background: white;
    margin-bottom: 48px;
    box-shadow: 5px 5px 0 var(--ink);
  }

  .search-inner {
    padding: 0;
  }

  .search-label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 20px 4px;
    opacity: 0.5;
  }

  .search-input {
    width: 100%;
    border: none;
    outline: none;
    padding: 4px 20px 14px;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    background: transparent;
    color: var(--ink);
  }

  .search-input::placeholder { color: var(--ink); opacity: 0.3; font-style: italic; }

  .search-btn {
    background: var(--rust);
    color: white;
    border: none;
    border-left: 2px solid var(--ink);
    padding: 0 32px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover { background: var(--shadow); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .filter-chip {
    border: 1.5px solid var(--ink);
    background: transparent;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-chip:hover, .filter-chip.active {
    background: var(--ink);
    color: var(--cream);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    color: var(--ink);
    opacity: 0.6;
    margin-bottom: 24px;
    min-height: 20px;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid var(--ink);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .spinner.active { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results grid */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    background: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 var(--shadow);
  }

  .niche-card {
    background: var(--paper);
    padding: 28px;
    transition: background 0.15s;
    animation: fadeUp 0.4s ease both;
  }

  .niche-card:hover { background: white; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .niche-card:nth-child(1) { animation-delay: 0.05s; }
  .niche-card:nth-child(2) { animation-delay: 0.1s; }
  .niche-card:nth-child(3) { animation-delay: 0.15s; }
  .niche-card:nth-child(4) { animation-delay: 0.2s; }
  .niche-card:nth-child(5) { animation-delay: 0.25s; }
  .niche-card:nth-child(6) { animation-delay: 0.3s; }

  .niche-number {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    opacity: 0.4;
    margin-bottom: 8px;
  }

  .niche-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .niche-desc {
    font-size: 0.72rem;
    line-height: 1.7;
    opacity: 0.75;
    margin-bottom: 16px;
  }

  .niche-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid currentColor;
  }

  .meta-tag.demand { color: var(--sage); border-color: var(--sage); }
  .meta-tag.competition { color: var(--rust); border-color: var(--rust); }
  .meta-tag.price { color: var(--gold); border-color: var(--gold); }

  .product-ideas {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed rgba(26,20,16,0.2);
  }

  .product-ideas-label {
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.45;
    margin-bottom: 6px;
  }

  .product-idea-list {
    font-size: 0.68rem;
    line-height: 1.8;
    opacity: 0.7;
  }

  /* Full-width summary card */
  .summary-card {
    grid-column: 1 / -1;
    background: var(--ink);
    color: var(--cream);
    padding: 28px;
    animation: fadeUp 0.4s ease 0.35s both;
  }

  .summary-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 10px;
  }

  .summary-text {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    line-height: 1.7;
    opacity: 0.9;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 40px;
    opacity: 0.4;
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }

  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 0.72rem;
    letter-spacing: 0.05em;
  }

  /* API key notice */
  .api-notice {
    background: var(--gold);
    border: 2px solid var(--ink);
    padding: 14px 20px;
    font-size: 0.7rem;
    line-height: 1.6;
    margin-bottom: 32px;
    display: none;
  }

  .api-notice.show { display: block; }

  .api-key-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
    border: 2px solid var(--ink);
    background: white;
    margin-top: 10px;
  }

  .api-key-input {
    border: none;
    outline: none;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: transparent;
    color: var(--ink);
    width: 100%;
  }

  .api-key-btn {
    background: var(--ink);
    color: white;
    border: none;
    border-left: 2px solid var(--ink);
    padding: 0 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    .container { padding: 24px 20px; }
    header { padding: 18px 20px; }
    .results-grid { grid-template-columns: 1fr; }
    .search-section { grid-template-columns: 1fr; }
    .search-btn { border-left: none; border-top: 2px solid var(--ink); padding: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Niche <span>Hunter</span></div>
  <div class="tagline">Etsy Product Ideation Agent</div>
</header>

<div class="container">

  <div class="api-notice show" id="apiNotice">
    ⚡ <strong>Enter your Anthropic API key to activate the agent.</strong> Your key stays in your browser only.
    <div class="api-key-row">
      <input class="api-key-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
      <button class="api-key-btn" onclick="saveApiKey()">Save</button>
    </div>
  </div>

  <div class="search-section">
    <div class="search-inner">
      <label class="search-label">Enter a theme, interest, or keyword</label>
      <input class="search-input" id="queryInput" type="text" placeholder="e.g. home office, pet lovers, self care..." />
    </div>
    <button class="search-btn" id="searchBtn" onclick="runAgent()">Hunt Niches →</button>
  </div>

  <div class="filters">
    <span style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;opacity:0.5;padding:6px 0;align-self:center;">Focus:</span>
    <button class="filter-chip active" data-filter="all" onclick="setFilter(this)">All Types</button>
    <button class="filter-chip" data-filter="printables" onclick="setFilter(this)">Printables</button>
    <button class="filter-chip" data-filter="digital art" onclick="setFilter(this)">Digital Art</button>
    <button class="filter-chip" data-filter="templates" onclick="setFilter(this)">Templates</button>
    <button class="filter-chip" data-filter="planners" onclick="setFilter(this)">Planners</button>
    <button class="filter-chip" data-filter="SVGs" onclick="setFilter(this)">SVGs / Clipart</button>
  </div>

  <div class="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="statusText">Ready to hunt. Enter a keyword above.</span>
  </div>

  <button id="debugBtn" style="margin-bottom:10px;background:none;border:1px solid #999;padding:4px 10px;cursor:pointer;font-size:0.65rem;letter-spacing:0.1em">DEBUG: Test API Connection</button>
  <pre id="debugBox" style="display:none;background:#1a1410;color:#a8ff78;padding:14px;font-size:0.65rem;overflow:auto;max-height:300px;margin-bottom:16px;white-space:pre-wrap;word-break:break-all"></pre>
  <div id="resultsContainer">
    <div class="empty-state">
      <span class="empty-icon">🎯</span>
      <div class="empty-title">No niches hunted yet</div>
      <div class="empty-sub">Enter a keyword and let the agent find opportunities</div>
    </div>
  </div>

</div>

<script>
  let apiKey = localStorage.getItem('niche_hunter_key') || '';
  let activeFilter = 'all';

  if (apiKey) {
    document.getElementById('apiNotice').classList.remove('show');
  }

  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (val.startsWith('sk-ant-') || val.startsWith('sk-')) {
      apiKey = val;
      localStorage.setItem('niche_hunter_key', val);
      document.getElementById('apiNotice').classList.remove('show');
      setStatus('API key saved. Ready to hunt!');
    } else {
      alert('Please enter a valid Anthropic API key (starts with sk-ant-)');
    }
  }

  function setFilter(el) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
  }

  function setStatus(msg, loading = false) {
    document.getElementById('statusText').textContent = msg;
    document.getElementById('spinner').classList.toggle('active', loading);
  }

  async function runAgent() {
    const query = document.getElementById('queryInput').value.trim();
    if (!query) { alert('Enter a keyword first!'); return; }
    if (!apiKey) {
      document.getElementById('apiNotice').classList.add('show');
      document.getElementById('apiKeyInput').focus();
      return;
    }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    setStatus('Agent is researching trending Etsy niches...', true);
    document.getElementById('resultsContainer').innerHTML = '';

    const filterNote = activeFilter !== 'all' ? ` Focus specifically on ${activeFilter}.` : '';

    const prompt = `You are an expert Etsy market researcher. Analyze trending opportunities for digital products on Etsy.

Topic/theme: "${query}"${filterNote}

Research and identify 6 profitable niche opportunities. For each niche provide:
1. A specific niche name (not generic)
2. A 2-sentence description of the opportunity and why it's trending
3. Demand level: High / Medium / Low
4. Competition level: High / Medium / Low  
5. Typical price range (e.g. $3–$8)
6. 3 specific product ideas within this niche

Also provide a 1-sentence strategic summary at the end.

Respond ONLY with valid JSON, no markdown, no backticks:
{
  "niches": [
    {
      "name": "...",
      "description": "...",
      "demand": "High|Medium|Low",
      "competition": "High|Medium|Low",
      "price": "$X–$Y",
      "products": ["...", "...", "..."]
    }
  ],
  "summary": "..."
}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          system: 'You are an Etsy market research expert. You always respond with valid JSON only — no prose, no markdown, no backticks, no explanation. Only a raw JSON object.',
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || 'API request failed');
      }

      const data = await response.json();
      const blocks = (data.content || []);
      const text = blocks.filter(b => b.type === 'text').map(b => b.text).join('');

      if (!text) {
        const types = blocks.map(b => b.type).join(', ');
        throw new Error('No text returned by API. Block types: [' + types + ']');
      }

      // Strip any accidental markdown fences and find JSON boundaries
      let raw = text.replace(/^[\s\S]*?(\{)/m, '$1');  // drop anything before first {
      const lastBrace = raw.lastIndexOf('}');
      if (lastBrace === -1) throw new Error('Response contained no JSON object. Got: ' + text.slice(0, 150));
      raw = raw.slice(0, lastBrace + 1);

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (pe) {
        throw new Error('JSON parse error: ' + pe.message + '. Preview: ' + raw.slice(0, 150));
      }

      if (!Array.isArray(parsed.niches)) {
        throw new Error('Unexpected JSON shape. Keys: ' + Object.keys(parsed).join(', '));
      }

      renderResults(parsed);
      setStatus('Found ' + parsed.niches.length + ' niche opportunities for "' + query + '"', false);

    } catch (err) {
      setStatus('Error: ' + err.message, false);
      const msg = err.message.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      document.getElementById('resultsContainer').innerHTML =
        '<div class="empty-state">' +
        '<span class="empty-icon">⚠️</span>' +
        '<div class="empty-title">Something went wrong</div>' +
        '<div class="empty-sub" style="word-break:break-word;max-width:520px;line-height:1.6">' + msg + '</div>' +
        '</div>';
    }

    btn.disabled = false;
  }

  // DEBUG: test API directly and show raw response
  async function debugAPI() {
    if (!apiKey) { alert('Enter API key first'); return; }
    const box = document.getElementById('debugBox');
    box.style.display = 'block';
    box.textContent = 'Calling API...';
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 100,
          messages: [{ role: 'user', content: 'Reply with exactly: {"test":true}' }]
        })
      });
      const data = await response.json();
      box.textContent = 'STATUS: ' + response.status + '\n\n' + JSON.stringify(data, null, 2);
    } catch(e) {
      box.textContent = 'FETCH ERROR: ' + e.message;
    }
  }

  function renderResults(data) {
    const container = document.getElementById('resultsContainer');

    const demandColor = d => d === 'High' ? 'demand' : d === 'Medium' ? 'price' : 'competition';
    const compColor = c => c === 'Low' ? 'demand' : c === 'Medium' ? 'price' : 'competition';

    const cards = data.niches.map((n, i) => `
      <div class="niche-card">
        <div class="niche-number">0${i + 1} —</div>
        <div class="niche-name">${n.name}</div>
        <div class="niche-desc">${n.description}</div>
        <div class="niche-meta">
          <span class="meta-tag ${demandColor(n.demand)}">↑ ${n.demand} demand</span>
          <span class="meta-tag ${compColor(n.competition)}">⚔ ${n.competition} competition</span>
          <span class="meta-tag price">💰 ${n.price}</span>
        </div>
        <div class="product-ideas">
          <div class="product-ideas-label">Product ideas</div>
          <div class="product-idea-list">${n.products.map(p => `→ ${p}`).join('<br>')}</div>
        </div>
      </div>
    `).join('');

    const summary = `
      <div class="summary-card">
        <div class="summary-label">Agent's Strategic Take</div>
        <div class="summary-text">${data.summary}</div>
      </div>
    `;

    container.innerHTML = `<div class="results-grid">${cards}${summary}</div>`;
  }

  // Enter key support
  document.getElementById('debugBtn').addEventListener('click', debugAPI);
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAgent();
  });
</script>
</body>
</html>
